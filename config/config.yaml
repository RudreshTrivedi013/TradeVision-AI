
data:
  # Default tickers for batch processing. Users can analyze ANY valid
  # ticker via the API or by passing --ticker to CLI scripts.
  default_tickers:
    - AAPL
    - MSFT
    - GOOGL
    - TSLA
    - AMZN
  default_start_date: "2022-01-01"
  default_end_date: "2024-12-31"
  raw_data_dir: "data/raw"
  features_dir: "data/features"
  metadata_dir: "data/metadata"
  max_consecutive_fill: 2          # forward-fill up to N consecutive missing days
  max_missing_pct: 0.05            # drop ticker if more than 5% missing
  volume_outlier_cap_percentile: 99

# --- Feature Engineering ---
features:
  rsi_period: 14
  macd_fast: 12
  macd_slow: 26
  macd_signal: 9
  bollinger_window: 20
  bollinger_std: 2
  volatility_window: 20
  volume_ratio_window: 20
  lag_periods:
    - 1
    - 3
    - 5
  sentiment_neutral_fill: 0.0      # use 0 when no news available

# --- Model Training ---
training:
  test_size: 0.2
  random_seed: 42
  models_dir: "models"
  target_column: "target_direction"  # 1 = up, 0 = down (next-day close vs today close)

  random_forest:
    n_estimators: 200
    max_depth: 10
    min_samples_split: 5
    min_samples_leaf: 2

  xgboost:
    n_estimators: 200
    max_depth: 6
    learning_rate: 0.1
    subsample: 0.8
    colsample_bytree: 0.8

  logistic_regression:
    C: 1.0
    max_iter: 1000
    solver: "lbfgs"

  isolation_forest:
    n_estimators: 100
    contamination: 0.05
    random_state: 42

# --- API ---
api:
  host: "0.0.0.0"
  port: 8000
  ticker_pattern: "^[A-Z]{1,5}$"

# --- Monitoring & Drift ---
monitoring:
  log_file: "logs/predictions.jsonl"
  drift_lookback_days: 30
  ks_pvalue_threshold: 0.05
  prediction_drift_threshold: 0.15   # 15 percentage points
  rolling_accuracy_window: 30
  min_accuracy_threshold: 0.55       # retrain if below 55%

# --- MLflow ---
mlflow:
  tracking_uri: "mlruns"
  experiment_name: "stock_ml_classifiers"

# --- Streamlit Dashboard ---
dashboard:
  title: "TradeVision AI Dashboard"
  default_ticker: "AAPL"
