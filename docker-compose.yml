version: "3.8"

services:
  api:
    build: .
    container_name: stock_ml_api
    ports:
      - "8000:8000"
    volumes:
      - ./logs:/app/logs
    command: uvicorn api.app:app --host 0.0.0.0 --port 8000
    restart: unless-stopped

  dashboard:
    build: .
    container_name: stock_ml_dashboard
    ports:
      - "8501:8501"
    volumes:
      - ./logs:/app/logs
    command: streamlit run dashboard/streamlit_app.py --server.port 8501 --server.address 0.0.0.0
    depends_on:
      - api
    restart: unless-stopped
